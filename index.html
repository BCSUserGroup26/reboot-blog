<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBOOT Development Blog</title>

    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">REBOOT</div>

    <nav>
        <a href="#">Home</a>
    </nav>
</header>

<div class="page-layout">

    <aside class="progress-sidebar">

        <h2>Progress</h2>

        <div class="progress-node complete">
            <div class="circle"></div>
            <span>Chapter 1</span>
        </div>

        <div class="progress-node current">
            <div class="circle"></div>
            <span>Chapter 1.5</span>
        </div>

        <div class="progress-node"><div class="circle"></div><span>Chapter 2</span></div>
        <div class="progress-node"><div class="circle"></div><span>Chapter 3</span></div>
        <div class="progress-node"><div class="circle"></div><span>Chapter 4</span></div>
        <div class="progress-node"><div class="circle"></div><span>Chapter 5</span></div>
        <div class="progress-node"><div class="circle"></div><span>Chapter 6</span></div>
        <div class="progress-node"><div class="circle"></div><span>Chapter 7</span></div>
        <div class="progress-node"><div class="circle"></div><span>Chapter 8</span></div>
        <div class="progress-node"><div class="circle"></div><span>Final Touches</span></div>

    </aside>

    <main class="content-area">

        <section class="hero">

            <span class="tag">
                Development Blog
            </span>

            <h1>REBOOT</h1>

            <p>
                Follow the development of REBOOT
                from Chapter 1 to release.
            </p>

        </section>

        <section class="section">

            <h2>Latest Blogs</h2>

            <div id="blog-list" class="blog-grid"></div>

        </section>

    </main>

</div>

<script src="assets/script.js"></script>

</body>
</html>
